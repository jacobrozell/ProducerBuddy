# SwiftLint configuration for MixStack.
# Run `swiftlint` from the repo root (CI runs it on every PR).

included:
  - Sources
  - Tests

excluded:
  - .build
  - DerivedData

disabled_rules:
  - todo                 # tracked in ROADMAP, not enforced by lint
  - trailing_comma

opt_in_rules:
  - empty_count
  - closure_spacing
  - first_where
  - sorted_first_last
  - contains_over_first_not_nil
  - redundant_nil_coalescing
  - explicit_init
  - fatal_error_message

line_length:
  warning: 120
  error: 160
  ignores_comments: true

type_body_length:
  warning: 365
  error: 500

file_length:
  warning: 500
  error: 700

function_body_length:
  warning: 80
  error: 140

identifier_name:
  min_length: 2
  excluded: [id, a, b, x, y, t, i, j, n, ch, s0, s1, s2]

type_name:
  min_length: 2
  excluded: [DS]

inclusive_language:
  additional_terms:
    - master
    - mastered
    - masterVersion
    - mstr

cyclomatic_complexity:
  warning: 12
