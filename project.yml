name: MixStack
options:
  bundleIdPrefix: com.jacobrozell
  deploymentTarget:
    iOS: "18.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: "7JT2JB89AV"
    CODE_SIGN_STYLE: Automatic
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    GENERATE_INFOPLIST_FILE: YES
    ENABLE_USER_SCRIPT_SANDBOXING: YES

targets:
  MixStack:
    type: application
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: Sources
      - path: Resources/Assets.xcassets
        buildPhase: resources
    resources:
      - path: Resources
        excludes:
          - "*.mp3"
          - "AppIconConcepts/**"
          - "README.md"
    postBuildScripts:
      - name: Copy Demo Audio
        basedOnDependencyAnalysis: false
        script: |
          dest="${TARGET_BUILD_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}"
          mkdir -p "${dest}"
          find "${SRCROOT}/Resources" -maxdepth 1 \( -iname '*.mp3' -o -iname '*.m4a' -o -iname '*.wav' \) -exec cp {} "${dest}/" \;
    settings:
      base:
        INFOPLIST_KEY_CFBundleDisplayName: MixStack
        INFOPLIST_KEY_CFBundleIconName: AppIcon
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        PRODUCT_BUNDLE_IDENTIFIER: com.jacobrozell.mixstack
        TARGETED_DEVICE_FAMILY: "1,2"
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "MixStack needs access so you can record and import audio."
        INFOPLIST_KEY_UIBackgroundModes: audio
        INFOPLIST_KEY_UIFileSharingEnabled: YES
        INFOPLIST_KEY_LSSupportsOpeningDocumentsInPlace: YES
        ENABLE_USER_SCRIPT_SANDBOXING: NO

  MixStackTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: Tests
    dependencies:
      - target: MixStack
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jacobrozell.mixstack.tests
        GENERATE_INFOPLIST_FILE: YES

  MixStackUISmokeUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: MixStackUITests/Support
      - path: MixStackUITests/TabSmokeUITests.swift
        type: file
    dependencies:
      - target: MixStack
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jacobrozell.mixstack.uitests.smoke
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: MixStack

  MixStackUILandscapeUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: MixStackUITests/Support
      - path: MixStackUITests/LandscapeSmokeUITests.swift
        type: file
    dependencies:
      - target: MixStack
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jacobrozell.mixstack.uitests.landscape
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: MixStack

  MixStackUIAccessibilityUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: MixStackUITests/Support
      - path: MixStackUITests/WCAGAccessibilityUITests.swift
        type: file
    dependencies:
      - target: MixStack
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jacobrozell.mixstack.uitests.accessibility
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: MixStack

  MixStackUIPadUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: MixStackUITests/Support
      - path: MixStackUITests/IPadSplitUITests.swift
        type: file
    dependencies:
      - target: MixStack
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jacobrozell.mixstack.uitests.ipad
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: MixStack

schemes:
  MixStack:
    build:
      targets:
        MixStack: all
    test:
      targets:
        - MixStackTests
        - name: MixStackUISmokeUITests
          parallelizable: true
        - name: MixStackUILandscapeUITests
          parallelizable: true
        - name: MixStackUIAccessibilityUITests
          parallelizable: true
        - name: MixStackUIPadUITests
          parallelizable: true
      gatherCoverageData: true

  MixStackCI:
    build:
      targets:
        MixStack: all
    test:
      targets:
        - MixStackTests
      gatherCoverageData: true

  MixStackUISmoke:
    build:
      targets:
        MixStack: all
    test:
      targets:
        - name: MixStackUISmokeUITests
          parallelizable: true

  MixStackUILandscape:
    build:
      targets:
        MixStack: all
    test:
      targets:
        - name: MixStackUILandscapeUITests
          parallelizable: true

  MixStackUIAccessibility:
    build:
      targets:
        MixStack: all
    test:
      targets:
        - name: MixStackUIAccessibilityUITests
          parallelizable: true

  MixStackUIPad:
    build:
      targets:
        MixStack: all
    test:
      targets:
        - name: MixStackUIPadUITests
          parallelizable: true

  MixStackUI:
    build:
      targets:
        MixStack: all
    test:
      targets:
        - name: MixStackUISmokeUITests
          parallelizable: true
        - name: MixStackUILandscapeUITests
          parallelizable: true
        - name: MixStackUIAccessibilityUITests
          parallelizable: true
        - name: MixStackUIPadUITests
          parallelizable: true
